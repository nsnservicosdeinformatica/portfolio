name: Deploy Vue.js to GitHub Pages

# Workflow para fazer o build e deploy do projeto Vue.js
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          cd pagina-games
          npm install

      - name: Build
        run: |
          cd pagina-games
          npm run build
          # Criar arquivo .nojekyll para evitar processamento do Jekyll
          touch dist/.nojekyll
          # Mover arquivos do build para a raiz
          cp -r dist/* ../

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .  # Usar a raiz do repositório
          branch: main
          clean: false
          clean-exclude: |
            pagina-games/src
            pagina-games/public
            pagina-games/package.json
            pagina-games/package-lock.json
            pagina-games/vue.config.js
            pagina-games/babel.config.js
            pagina-games/jsconfig.json
            pagina-games/.gitignore
            pagina-games/README.md
          token: ${{ secrets.GITHUB_TOKEN }} 